[profile.default]
# Compilation
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 100000

# Testing
gas_reports = ["*"]
verbosity = 3
chain_id = 99
block_timestamp = 2592000

[profile.ci.fuzz]
runs = 5000

[profile.default.fuzz]
runs = 100

[invariant]
runs = 500000000
depth = 100
include_storage = true
show_solidity = true
show_metrics = true
fail_on_revert = false
continuous_run = true
corpus_dir = "corpus/foundry"

[profile.default.fmt]
int_types = "preserve"
number_underscore = "preserve"

[profile.default.rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
tenderly = "${TENDERLY_FORK_URL}"

